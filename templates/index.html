<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umugwaneza</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial, sans-serif;
    background:#ffe4e1;
    overflow:hidden;
}

/* Timeline */
.timeline {
    height:100vh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
}

/* Scrollbar */
.timeline::-webkit-scrollbar { width:6px; }
.timeline::-webkit-scrollbar-thumb {
    background:rgba(0,0,0,0.25);
    border-radius:10px;
}

/* Slides */
.timeline-item {
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    flex-direction: row;
    align-items:center;
    justify-content:flex-start;
    padding:40px;
    position: relative;
}
.timeline-item h2 {
    font-family: 'Great Vibes', cursive !important;
    font-size: 64px;
    line-height: 1.2;
    letter-spacing: 2px;
    text-shadow: 0 4px 15px rgba(0,0,0,0.15);
}
/* COVER */
#cover {
    background:#FFF5E1;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#cover h2 {
    font-size:3rem;
    margin-bottom:20px;
    animation: fadeIn 1.5s ease forwards;
}

#cover span {
    font-size:1.4rem;
    max-width:600px;
    line-height:1.6;
    opacity:0;
    animation: fadeIn 1.5s ease forwards;
    animation-delay:0.8s;
}

/* Titles */
.timeline-item:not(#cover) h2 {
    position:absolute;
    top:20px;
    left:40px;
    font-size:2rem;
}

/* Images */
.timeline-item img {
    width:38vw;
    height:55vh;
    object-fit:cover;
    border-radius:12px;
    margin-right:30px;
}

#chapter6 img {
    object-position: top center;
}
#promposal {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

#promposal h2 {
    position: static;
    margin-bottom: 20px;
    font-size: 2.5rem;
}
/* Text box */
#promposal .content {
    background: none;
    padding: 0;

    font-family: 'Great Vibes', cursive;
    font-size: 3rem;
    color: #d63384;
    text-shadow: 0 4px 15px rgba(0,0,0,0.15);
    opacity: 0;
    transform: translateY(40px);
    transition: all 1.2s ease;
}
#promposal .content {
    letter-spacing: 1px;
    line-height: 1.4;
}
#promposal {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* Title */
#promposal h2 {
    position: static;
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    margin-bottom: 30px;

    opacity: 0;
    transform: translateY(40px);
    transition: all 1.2s ease;
}

/* Question text (NO BOX) */
#promposal .content {
    background: none;
    padding: 0;

    font  -family: 'Allura', cursive;
    font-size: 3.2rem;
    color: #d63384;

    letter-spacing: 1px;
    line-height: 1.4;

    opacity: 0;
    transform: translateY(40px);
    transition: all 1.2s ease;
}

/* Buttons */
.button {
    padding: 18px 45px;
    font-size: 1.3rem;
    border-radius: 50px;
    margin: 15px;
}

/* Fade-in active state */
#promposal.active h2,
#promposal.active .content {
    opacity: 1;
    transform: translateY(0);
}
}

/* Buttons */
.button {
    padding:10px 30px;
    border:none;
    border-radius:50px;
    margin:10px;
    cursor:pointer;
}

/* Overlay */
#yesOverlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(255,192,203,0.9);
    z-index:1000;
}
#chapter5 {
    position: relative;
}

#chapter5 {
    position: relative;
}

#chapter5 .sticker {
    position: absolute;

    width: 180px;   /* smaller */
    height: auto;

    filter: drop-shadow(0 15px 25px rgba(0,0,0,0.25));
}
#chapter5 .sticker {
    transform: rotate(-5deg);
}
/* Sticker positions */
#chapter5 .s1 {
    top: 80px;
    right: 60px;
    transform: rotate(-6deg);
}

#chapter5 .s2 {
    top: 250px;
    right: 220px;
    transform: rotate(8deg);
}

#chapter5 .s3 {
    bottom: 100px;
    right: 100px;
    transform: rotate(-10deg);
}

#chapter5 .s4 {
    top: 150px;
    right: 350px;
    transform: rotate(5deg);
}
/* Hearts */
.heart {
    position:absolute;
    animation: floatUp linear forwards;
}
@keyframes floatUp {
    0% { transform:translateY(0); opacity:1; }
    100% { transform:translateY(-400px); opacity:0; }
}

/* Fade */
@keyframes fadeIn {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
}

/* Back arrow */
#backArrow {
    position:fixed;
    top:20px;
    left:20px;
    font-size:2rem;
    cursor:pointer;
    display:none;
    z-index:1001;
}

/* Mobile */
@media (max-width:768px){
    .timeline-item img { width:45vw; height:auto; }
    .content { max-width:45vw; }
    #cover h2 { font-size:2rem; }
}
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.fade {
    font-size: 22px;
    color: #ff4d6d;
    animation: fade 1.5s infinite;
}

@keyframes fade {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
}
</style>
</head>

<body>
<div id="loader">
    <h2 class="fade">Hi, Melissa</h2>
</div>
<a id="backArrow">⬅</a>

<audio id="bg-music" loop>
<source src="../static/music/song.mp3" type="audio/mpeg">
</audio>

<audio id="typing-sound" src="../static/music/typing.wav"></audio>

<div class="timeline" id="timeline">

<!-- COVER -->
<div class="timeline-item" id="cover">
    <h2>Our Story 💖</h2>
    <span data-text="Every story is special…
This is ours.

Scroll down to begin."></span>
</div>

<!-- Slide 1 -->
<div class="timeline-item">
<h2> I: Before You</h2>
<img src="../static/pics/I.JPG">
<div class="content"><span data-text="September 2023… a new school, new faces, new everything — a fresh start for me.

I liked it that way. No one knew me, so I could build the version of myself I wanted.
I decided I was going to be the quiet guy. I had this mindset that Cambridge kids talk too much (which… wasn’t entirely wrong 😂), and I didn’t want to be like that.

Most importantly, I told myself I was going to avoid girls completely, based on my past experiences (yeah… I know how that sounds now 😭).

Then one day during prep, I was sitting at the back of the class.
And somewhere in the middle of all that… you walked in.

I remember Ivan catching me staring and laughing about it, then telling me your name.
After that… I just went back to my “quiet life.”

I didn’t know it then, but that moment was the beginning of everything."></span></div>
</div>

<!-- Slide 2 -->
<div class="timeline-item" id="chapter2">
<h2> II: We meet</h2>
<img src="../static/pics/II.jpeg">
<div class="content"><span data-text="For a while, nothing really happened.
You were just someone I noticed… and that was it.

But then February 2024 came.

I remember this one Tuesday break at 10am.
Joachim and I were sitting in class when Tania came up to us and said,
“Melissa says hi.”

I don’t know what came over me… but I decided to come talk to you.

I remember talking to this very shy girl who couldn’t stand still or even make eye contact 😂

And I can’t lie… I was a bit nervous too,
because I literally asked for your name like I hadn’t known it for months 🤦🏽

But somehow… talking to you didn’t feel like a distraction.
It felt different.

And I started to notice something…
I actually looked forward to those moments; to talking to you.
"></span></div>
</div>

<!-- Slide 3 -->
<div class="timeline-item">
<h2> III: We are together!🥳</h2>
<img src="../static/pics/III.JPG">
<div class="content"><span data-text="By June 2024, we had grown inseparable — talking every day, any chance we got .

I knew something special was happening, but I kept overthinking it 🤦🏽‍♂️
Like… what if I ruined everything, what if I made things awkward, what if I was reading it all wrong 😭

So for a while, I just stayed quiet about it 🤐
Even though every time we talked, I felt like saying something.

Then came Friday the 7th, around 12.
We were outside our classes, talking like we usually did.

And I remember just standing there for a second thinking… I can’t keep doing this to myself .

So I just said it 😮‍💨

I asked you out 💖

I can’t lie… I was really nervous 😭
I don’t even know why my confidence betrayed me like that in the moment 🤦🏽‍♂️
I had to hype myself up like a thousand times just to say it 💀

But fortunately… you said YES 😳💖
Lucky me, right? 😌

And from then on, we were together 💑✨"></span></div>
</div>

<!-- Slide 4 -->
<div class="timeline-item">
<h2> IV: The Break</h2>
<img src="../static/pics/IV.jpg">
<div class="content"><span data-text="After that… things slowly started to change.

It wasn’t something sudden, just little shifts over time that we both probably felt, but didn’t really say out loud.

And eventually, we got to a point where things didn’t feel the same anymore.

So late December 2024,you made the decision to end it.

I won’t lie… it hurt, but I later came to understand why you had to do it.

I also realized it wasn’t working the way it should anymore.

So we let it go."></span></div>
</div>

<!-- Slide 5 -->
<div class="timeline-item" id="chapter5">
<h2> V : Friends</h2>


<img src="../static/pics/s1.PNG" class="sticker s1">
<img src="../static/pics/s2.png" class="sticker s2">
<img src="../static/pics/s3.png" class="sticker s3">

At first, things were a bit distant, like we both needed space.

But over time, that distance didn’t feel as heavy anymore.

And somehow, we started talking again… just as friends.

No pressure, no expectations — just normal conversations like before, but in a different way.

And I actually appreciated that a lot.

It felt peaceful… like things had found a new balance.
Summer came and we talked a lot more. I remember the daily FaceTime calls and our SAT classes together.
Through all that , I gained a bestfriend🧡.

"></span>
</div>
</div>

<div class="timeline-item" id="chapter6">

It feels a bit strange thinking about it like that because we’ve come a long way but it’s also kind of peaceful.

Because now, things between us are better than ever.

No pressure, no confusion; just something real and comfortable.

<!-- Promposal -->

<h2>So....</h2>

<div class="content">
Umugwaneza Melissa, carry our candles together?

<button class="button" id="yesBtn">Yes 💖</button>
<button class="button" id="noBtn">No 😏</button>
</div>
</div>

</div>

<div id="yesOverlay">
<h1>Best decision ever 😍</h1>
</div>

<script>
const timeline = document.getElementById("timeline");
const items = document.querySelectorAll(".timeline-item");
const typingSound = document.getElementById("typing-sound");
const backArrow = document.getElementById("backArrow");
const overlay = document.getElementById("yesOverlay");
const promposal = document.getElementById("promposal");

const observer2 = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            promposal.classList.add("active");
        }
    });
}, { threshold: 0.6 });

observer2.observe(promposal);
/* SCROLL LOCK */
let isScrolling = false;
timeline.addEventListener("wheel", e => {
    e.preventDefault();
    if (isScrolling) return;

    isScrolling = true;
    const current = Math.round(timeline.scrollTop / window.innerHeight);
    const direction = e.deltaY > 0 ? 1 : -1;
    let target = Math.max(0, Math.min(current + direction, items.length - 1));

    timeline.scrollTo({ top: target * window.innerHeight, behavior:"smooth" });
    setTimeout(()=> isScrolling=false, 800);
}, { passive:false });

/* TYPEWRITER */
function typewriter(el){
    if (!el || el.dataset.done) return;
    el.dataset.done = "true";
    const text = el.dataset.text;
    el.innerHTML = "";
    let i = 0;

    function type(){
        if(i < text.length){
            if(text[i] === "\n") el.innerHTML += "<br>";
            else el.innerHTML += text[i];

            typingSound.currentTime = 0;
            typingSound.volume = 0.3;
            typingSound.play();

            i++;
            setTimeout(type, 40);
        }
    }
    type();
}

/* OBSERVER */
const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            typewriter(entry.target.querySelector("span"));
        }
    });
},{ threshold:0.6 });

items.forEach(item => observer.observe(item));

/* NO BUTTON */
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    noBtn.style.position = "absolute";
    noBtn.style.transition = "0.2s ease";
    const padding = 80; // keeps it away from edges

    const x = Math.random() * (window.innerWidth - padding);
    const y = Math.random() * (window.innerHeight - padding);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

/* YES BUTTON */
document.getElementById("yesBtn").onclick = ()=>{
    overlay.style.display="flex";
    backArrow.style.display="block";

    for(let i=0;i<30;i++){
        const heart=document.createElement("div");
        heart.className="heart";
        heart.innerText="💖";
        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.animationDuration=(2+Math.random()*2)+"s";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),4000);
    }

    // Optional: send backend request here if using Node.js/Twilio
    fetch("/send-yes", { method: "POST" });
};

/* BACK */
backArrow.onclick = ()=>{
    overlay.style.display="none";
    backArrow.style.display="none";
    document.getElementById("promposal").scrollIntoView({behavior:"smooth"});
};

/* MUSIC */
document.body.addEventListener("click", ()=>{
    const music=document.getElementById("bg-music");
    music.volume=0.2;
    music.play();
}, { once:true });
window.addEventListener("load", () => {
    const loader = document.getElementById("loader");

    setTimeout(() => {
        loader.style.opacity = "0";
        loader.style.transition = "0.8s ease";

        setTimeout(() => {
            loader.style.display = "none";
        }, 800);

    }, 1500); // fake loading delay for vibe
});
</script>

</body>
